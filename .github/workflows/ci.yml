name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  pipeline:
    name: Pipeline (typecheck + ingest mock)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: pipeline/package-lock.json

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Ingest en mode mock
        run: npx tsx src/ingest.ts --mock --output ../data/budget.generated.json

      - name: Valider le JSON produit
        run: |
          node -e "
            const d = require('../data/budget.generated.json');
            const req = ['generatedAt','annee','dettePublique','pib','tauxOat10ans','vitesseEndettementEurParSec','series','sources'];
            for (const k of req) if (!(k in d)) { console.error('clé manquante:', k); process.exit(1); }
            console.log('dette =', (d.dettePublique.value/1e9).toFixed(0), 'Md€');
            console.log('OAT   =', d.tauxOat10ans.value, '%');
            console.log('sources:', d.sources.length);
          "

      - uses: actions/upload-artifact@v4
        with:
          name: budget-generated
          path: data/budget.generated.json

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm install --no-audit --no-fund

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  docker:
    name: Docker build (sanity check)
    runs-on: ubuntu-latest
    needs: [pipeline, frontend]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image pipeline
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/pipeline.Dockerfile
          push: false
          tags: budget-france-pipeline:ci

      - name: Build image frontend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/frontend.Dockerfile
          push: false
          tags: budget-france-frontend:ci

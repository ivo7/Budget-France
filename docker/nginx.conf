server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api vers le backend Fastify.
    # Les routes /api/confirm et /api/unsubscribe renvoient du HTML,
    # /api/subscribe renvoie du JSON.
    location /api/ {
        proxy_pass http://backend:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # Le SPA : tout ce qui n'est pas un fichier existant renvoie index.html
    location / {
        try_files $uri /index.html;
    }

    # Le snapshot budget est servi sans cache pour que les updates du
    # pipeline soient visibles immédiatement côté client.
    location /data/ {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        expires 0;
    }

    # Assets statiques : cache long
    location ~* \.(?:js|css|svg|png|jpg|jpeg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    # Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 512;
}
